import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, onSnapshot, query, orderBy, serverTimestamp, arrayUnion, Timestamp, getDoc, setDoc } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyC2Jc8KUg9QBlGwuqwlN3tQ6C_B1zZi7QU",
  authDomain: "crm-costa-galvao.firebaseapp.com",
  projectId: "crm-costa-galvao",
  storageBucket: "crm-costa-galvao.firebasestorage.app",
  messagingSenderId: "876223519085",
  appId: "1:876223519085:web:a8fc137a9103796deb6264"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);
const auth= getAuth(app);

let currentUser=null, allLeads=[], allUsers=[], editingLeadId=null;
let currentTab='kanban', filterStatus='ALL', searchQuery='';
let chartInstances={}, fuFilter='TODOS', relKpiFilter=null;
let activeQuickNotes=new Set(), presenceInterval=null;

const STATUS_META={
  'EM ANDAMENTO':    {color:'#4F6EF7',bg:'rgba(79,110,247,0.12)', label:'Em Andamento'},
  'QUALIFICADO':     {color:'#10B981',bg:'rgba(16,185,129,0.12)', label:'Qualificado'},
  'CONTRATO FECHADO':{color:'#8B5CF6',bg:'rgba(139,92,246,0.12)',label:'Contrato Fechado'},
  'DESQUALIFICADO':  {color:'#EF4444',bg:'rgba(239,68,68,0.12)',  label:'Desqualificado'},
  'SEM RESPOSTA':    {color:'#F5A623',bg:'rgba(245,166,35,0.12)', label:'Sem Resposta'},
};
const TRILHA_SM=[1,3,7,15], TRILHA_GERAL=[1,3,7,15,30];

// ─── AUTH ───
onAuthStateChanged(auth, async user=>{
  if(user){
    const snap=await getDoc(doc(db,'usuarios',user.uid)).catch(()=>null);
    if(snap?.exists()){
      currentUser={uid:user.uid,email:user.email,...snap.data()};
      showApp();
    } else { await signOut(auth); showScreen('login'); }
  } else {
    currentUser=null;
    const snap=await getDoc(doc(db,'config','setup')).catch(()=>null);
    showScreen((!snap?.exists()||!snap.data()?.configured)?'first-setup':'login');
  }
});

function showScreen(n){
  ['first-setup','login','app'].forEach(s=>{const el=document.getElementById('screen-'+s);if(el)el.style.display='none';});
  const el=document.getElementById('screen-'+n); if(el)el.style.display='flex';
}

function showApp(){
  showScreen('app');
  document.getElementById('header-name').textContent=currentUser.nome||currentUser.email;
  document.getElementById('header-role').textContent=currentUser.role==='gestora'?'Gestora':'Atendente';
  const isGestora=currentUser.role==='gestora';
  ['tab-relatorios','tab-equipe','tab-estrategia'].forEach(t=>{
    const el=document.getElementById(t); if(el) el.style.display=isGestora?'inline-block':'none';
  });
  startLeadsListener();
  startPresence();
  if(isGestora) startUsersListener();
}

// ─── FIRST SETUP ───
window.criarContaGestora=async function(){
  const nome=document.getElementById('setup-nome').value.trim();
  const email=document.getElementById('setup-email').value.trim();
  const senha=document.getElementById('setup-senha').value;
  const conf=document.getElementById('setup-conf').value;
  if(!nome||!email||!senha) return showToast('Preencha todos os campos','error');
  if(senha!==conf) return showToast('Senhas não coincidem','error');
  if(senha.length<6) return showToast('Mínimo 6 caracteres','error');
  try{
    setBtnLoading('btn-setup',true);
    const cred=await createUserWithEmailAndPassword(auth,email,senha);
    await setDoc(doc(db,'usuarios',cred.user.uid),{nome,email,role:'gestora',ativo:true,criadoEm:serverTimestamp()});
    await setDoc(doc(db,'config','setup'),{configured:true});
    showToast('Conta criada!');
  }catch(e){showToast(fbErr(e.code),'error');}
  finally{setBtnLoading('btn-setup',false);}
};

window.fazerLogin=async function(){
  const email=document.getElementById('login-email').value.trim();
  const senha=document.getElementById('login-senha').value;
  if(!email||!senha) return showToast('Preencha e-mail e senha','error');
  try{setBtnLoading('btn-login',true);await signInWithEmailAndPassword(auth,email,senha);}
  catch(e){showToast(fbErr(e.code),'error');}
  finally{setBtnLoading('btn-login',false);}
};

window.fazerLogout=async function(){
  if(!confirm('Deseja sair?')) return;
  if(currentUser) await setDoc(doc(db,'presence',currentUser.uid),{online:false,nome:currentUser.nome,lastSeen:serverTimestamp()}).catch(()=>{});
  clearInterval(presenceInterval);
  await signOut(auth);
};

// ─── PRESENÇA ───
async function startPresence(){
  if(!currentUser) return;
  const ref=doc(db,'presence',currentUser.uid);
  const ping=()=>setDoc(ref,{online:true,nome:currentUser.nome,lastSeen:serverTimestamp()},{merge:true}).catch(()=>{});
  await ping();
  presenceInterval=setInterval(ping,30000);
  onSnapshot(collection(db,'presence'),snap=>{
    const online=snap.docs.filter(d=>{
      const ls=d.data().lastSeen?.toDate?.();
      return d.data().online && ls && (new Date()-ls)<120000;
    }).map(d=>({id:d.id,...d.data()}));
    renderOnlineUsers(online);
  });
  window.addEventListener('beforeunload',()=>setDoc(ref,{online:false,lastSeen:serverTimestamp()},{merge:true}).catch(()=>{}));
}

function renderOnlineUsers(online){
  const el=document.getElementById('online-users'); if(!el) return;
  el.innerHTML=online.map(u=>`<div class="online-badge" title="${u.nome} online"><span class="online-dot"></span><span class="online-name">${u.nome}</span></div>`).join('');
}

// ─── EQUIPE ───
function startUsersListener(){
  onSnapshot(collection(db,'usuarios'),snap=>{
    allUsers=snap.docs.map(d=>({id:d.id,...d.data()}));
    renderFuFilterBtns();
    if(currentTab==='equipe') renderEquipe();
  });
}

window.abrirModalEquipe=function(uid){
  const u=uid?allUsers.find(x=>x.id===uid):null;
  document.getElementById('eq-uid').value=uid||'';
  document.getElementById('eq-nome').value=u?.nome||'';
  document.getElementById('eq-email').value=u?.email||'';
  document.getElementById('eq-role').value=u?.role||'atendente';
  document.getElementById('eq-senha').value='';
  document.getElementById('eq-modal-title').textContent=u?'Editar Colaboradora':'Nova Colaboradora';
  document.getElementById('eq-senha-row').style.display=u?'none':'flex';
  document.getElementById('btn-eq-delete').style.display=u?'block':'none';
  document.getElementById('modal-equipe').style.display='flex';
};
window.fecharModalEquipe=()=>document.getElementById('modal-equipe').style.display='none';

window.salvarColaboradora=async function(){
  const uid=document.getElementById('eq-uid').value;
  const nome=document.getElementById('eq-nome').value.trim();
  const email=document.getElementById('eq-email').value.trim();
  const role=document.getElementById('eq-role').value;
  const senha=document.getElementById('eq-senha').value;
  if(!nome||!email) return showToast('Nome e e-mail obrigatórios','error');
  if(uid){await updateDoc(doc(db,'usuarios',uid),{nome,role});showToast('Atualizado!');fecharModalEquipe();}
  else{
    if(!senha||senha.length<6) return showToast('Senha mínimo 6 caracteres','error');
    try{
      setBtnLoading('btn-eq-save',true);
      const cred=await createUserWithEmailAndPassword(auth,email,senha);
      await setDoc(doc(db,'usuarios',cred.user.uid),{nome,email,role,ativo:true,criadoEm:serverTimestamp()});
      showToast('Colaboradora criada! Recarregando...');
      setTimeout(()=>location.reload(),1500);
    }catch(e){showToast(fbErr(e.code),'error');}
    finally{setBtnLoading('btn-eq-save',false);}
  }
};
window.excluirColaboradora=async function(){
  const uid=document.getElementById('eq-uid').value;
  if(!uid||!confirm('Remover acesso?')) return;
  await updateDoc(doc(db,'usuarios',uid),{ativo:false});
  showToast('Acesso removido.','warn');fecharModalEquipe();
};

function renderEquipe(){
  const el=document.getElementById('equipe-lista'); if(!el) return;
  el.innerHTML=allUsers.map(u=>`
    <div class="user-card">
      <div class="user-avatar">${(u.nome||'?')[0].toUpperCase()}</div>
      <div class="user-info">
        <div class="user-name">${u.nome}</div>
        <div class="user-email">${u.email}</div>
        <span class="user-role ${u.role==='gestora'?'role-gestora':'role-atendente'}">${u.role==='gestora'?'Gestora':'Atendente'}</span>
      </div>
      <button class="btn-edit-user" onclick="abrirModalEquipe('${u.id}')">Editar</button>
    </div>`).join('');
}

// ─── LEADS LISTENER ───
function startLeadsListener(){
  const q=query(collection(db,'leads'),orderBy('createdAt','desc'));
  onSnapshot(q,snap=>{allLeads=snap.docs.map(d=>({id:d.id,...d.data()}));renderAll();});
}

function renderAll(){
  renderMetrics();
  renderFollowups();
  if(currentTab==='kanban') renderKanban();
  else if(currentTab==='table') renderTable();
  else if(currentTab==='equipe') renderEquipe();
  else if(currentTab==='relatorios') renderRelatorios();
  else if(currentTab==='estrategia') renderEstrategia();
}

// ─── MÉTRICAS ───
function renderMetrics(){
  const now=new Date(); const m=now.getMonth(),y=now.getFullYear();
  const mo=allLeads.filter(l=>{const d=l.createdAt?.toDate?.();return d&&d.getMonth()===m&&d.getFullYear()===y;});
  document.getElementById('m-total').textContent   =mo.length;
  document.getElementById('m-andamento').textContent=mo.filter(l=>l.status==='EM ANDAMENTO').length;
  document.getElementById('m-qualif').textContent  =mo.filter(l=>l.status==='QUALIFICADO').length;
  document.getElementById('m-contrato').textContent=mo.filter(l=>l.status==='CONTRATO FECHADO').length;
  document.getElementById('m-semresp').textContent =mo.filter(l=>l.status==='SEM RESPOSTA').length;
}

// ─── FOLLOW-UP EM COLUNAS ───
function renderFuFilterBtns(){
  const cont=document.getElementById('fu-filter-btns'); if(!cont) return;
  const names=['TODOS',...allUsers.map(u=>u.nome).filter(Boolean)];
  const unique=[...new Set(names)];
  cont.innerHTML=unique.map(n=>`<button class="fu-filter-btn ${fuFilter===n?'active':''}" onclick="setFuFilter('${n}')">${n==='TODOS'?'Todos':n}</button>`).join('');
}

window.setFuFilter=function(f){fuFilter=f;renderFuFilterBtns();renderFollowups();};

function renderFollowups(){
  const now=new Date(); const todayStart=new Date(now); todayStart.setHours(0,0,0,0);
  const todayEnd=new Date(now); todayEnd.setHours(23,59,59,999);

  let pending=allLeads.filter(l=>{
    if(!['EM ANDAMENTO','SEM RESPOSTA','QUALIFICADO'].includes(l.status)) return false;
    if(!l.nextFollowup) return false;
    const d=l.nextFollowup?.toDate?l.nextFollowup.toDate():new Date(l.nextFollowup);
    return d<=todayEnd;
  });
  if(fuFilter!=='TODOS') pending=pending.filter(l=>l.assignee===fuFilter);

  const atrasados=pending.filter(l=>{
    const d=l.nextFollowup?.toDate?l.nextFollowup.toDate():new Date(l.nextFollowup);
    return d<todayStart;
  }).sort((a,b)=>{
    const da=a.nextFollowup?.toDate?a.nextFollowup.toDate():new Date(a.nextFollowup);
    const db_=b.nextFollowup?.toDate?b.nextFollowup.toDate():new Date(b.nextFollowup);
    return da-db_;
  });

  const hoje=pending.filter(l=>{
    const d=l.nextFollowup?.toDate?l.nextFollowup.toDate():new Date(l.nextFollowup);
    return d>=todayStart&&d<=todayEnd;
  });

  const totalBadge=pending.length;
  const badge=document.getElementById('fu-badge');
  badge.textContent=totalBadge; badge.style.display=totalBadge?'flex':'none';
  document.getElementById('fu-atraso-count').textContent=atrasados.length;
  document.getElementById('fu-hoje-count').textContent=hoje.length;

  const pulsing=pending.length>0;
  document.getElementById('fu-panel').classList.toggle('pulsing',pulsing);

  document.getElementById('col-atrasados').innerHTML=atrasados.length
    ?atrasados.map(l=>fuCard(l,todayStart)).join('')
    :`<div class="fu-col-empty">✅ Nenhum em atraso</div>`;

  document.getElementById('col-hoje').innerHTML=hoje.length
    ?hoje.map(l=>fuCard(l,todayStart)).join('')
    :`<div class="fu-col-empty">✅ Nenhum para hoje</div>`;
}

function fuCard(l,todayStart){
  const fu=l.nextFollowup?.toDate?l.nextFollowup.toDate():new Date(l.nextFollowup);
  const daysLate=Math.floor((todayStart-fu)/(1000*60*60*24));
  const isLate=fu<todayStart;
  const sm=STATUS_META[l.status]||STATUS_META['EM ANDAMENTO'];
  const wa=formatPhone(l.phone);
  const trilha=l.tipo==='SM'?TRILHA_SM:TRILHA_GERAL;
  const etapa=l.etapaFollowup||0;
  const etapaLabel=l.tipo==='SM'&&etapa>=trilha.length?'Mensal':`Etapa ${etapa+1}`;
  const hist=l.followupHistory||[];
  return `
  <div class="fu-card2 ${isLate?'fu-late':''}" onclick="openLead('${l.id}')">
    <div class="fu2-header">
      <span class="fu2-name">${l.name||'Sem Nome'}</span>
      <span class="status-pill" style="color:${sm.color};background:${sm.bg}">${sm.label}</span>
    </div>
    <div class="fu2-meta">
      ${l.tipo?`<span class="tipo-tag tipo-${l.tipo==='SM'?'sm':'geral'}">${l.tipo==='SM'?'SM':'Geral'}</span>`:''}
      <span class="fu2-etapa">${etapaLabel}</span>
      <span class="fu2-resp">${l.assignee||'—'}</span>
    </div>
    ${isLate?`<div class="fu2-atraso">⚠️ ${daysLate===0?'Vence hoje':`${daysLate} dia${daysLate>1?'s':''} em atraso`}</div>`:`<div class="fu2-hoje">📅 Hoje</div>`}
    ${hist.length?`<div class="fu2-trail">${hist.slice(-3).map(h=>`<span class="trail-dot" title="${h.label} — ${h.doneBy}">✓</span>`).join('')}${hist.length>3?`<span class="trail-more">+${hist.length-3}</span>`:''}</div>`:''}
    ${l.currentNote?`<div class="fu2-note">${l.currentNote}</div>`:''}
    <div class="fu2-actions" onclick="event.stopPropagation()">
      ${wa?`<a href="https://wa.me/${wa}" target="_blank" class="btn-wa">WhatsApp</a>`:''}
      <button onclick="avancarEtapaFollowup('${l.id}')" class="btn-done">✓ Feito</button>
    </div>
  </div>`;
}

// ─── TRILHA ───
function calcularProximoFollowup(lead){
  const trilha=lead.tipo==='SM'?TRILHA_SM:TRILHA_GERAL;
  const etapa=lead.etapaFollowup||0;
  const base=lead.lastContact?.toDate?lead.lastContact.toDate():new Date();
  if(lead.tipo==='SM'&&etapa>=trilha.length){
    if(!lead.dataParto) return null;
    const parto=lead.dataParto?.toDate?lead.dataParto.toDate():new Date(lead.dataParto);
    const ultimo=lead.ultimoFollowupMensal?.toDate?lead.ultimoFollowupMensal.toDate():base;
    const prox=new Date(ultimo); prox.setMonth(prox.getMonth()+1);
    return prox>parto?null:prox;
  }
  if(etapa>=trilha.length) return null;
  const d=new Date(base); d.setDate(d.getDate()+trilha[etapa]);
  return d;
}

async function avancarEtapaFollowup(id){
  const l=allLeads.find(x=>x.id===id); if(!l) return;
  const trilha=l.tipo==='SM'?TRILHA_SM:TRILHA_GERAL;
  const etapa=(l.etapaFollowup||0)+1;
  const prox=calcularProximoFollowup({...l,etapaFollowup:etapa,lastContact:{toDate:()=>new Date()}});
  const etapaLabel=l.tipo==='SM'&&etapa-1>=trilha.length?'Mensal':`Etapa ${etapa}`;
  const histEntry={etapa,label:etapaLabel,doneAt:new Date().toISOString(),doneBy:currentUser?.nome||'—'};
  const upd={
    etapaFollowup:etapa,lastContact:serverTimestamp(),
    nextFollowup:prox?Timestamp.fromDate(prox):null,
    followupHistory:arrayUnion(histEntry),
    log:arrayUnion({user:currentUser?.nome||'—',note:`Follow-up ${etapaLabel} realizado${prox?' — próximo: '+formatDate(prox):''}`,ts:new Date().toISOString(),statusChange:null})
  };
  if(l.tipo==='SM'&&etapa>=trilha.length) upd.ultimoFollowupMensal=serverTimestamp();
  await updateDoc(doc(db,'leads',id),upd);
  showToast(prox?`✓ Feito! Próximo: ${formatDate(prox)}`:'✓ Trilha concluída!');
}

// ─── KANBAN ───
function renderKanban(){
  const cols={'EM ANDAMENTO':[],'SEM RESPOSTA':[],'QUALIFICADO':[],'CONTRATO FECHADO':[],'DESQUALIFICADO':[]};
  allLeads.forEach(l=>{if(cols[l.status])cols[l.status].push(l);});
  Object.keys(cols).forEach(status=>{
    const el=document.getElementById('col-'+status); if(!el) return;
    document.getElementById('col-count-'+status).textContent=cols[status].length;
    el.innerHTML=cols[status].length===0?`<div class="col-empty">Nenhum lead</div>`:cols[status].map(l=>kanbanCard(l)).join('');
    el.ondragover=e=>{e.preventDefault();el.classList.add('drag-over');};
    el.ondragleave=()=>el.classList.remove('drag-over');
    el.ondrop=async e=>{
      e.preventDefault();el.classList.remove('drag-over');
      const leadId=e.dataTransfer.getData('leadId');
      if(!leadId) return;
      const l=allLeads.find(x=>x.id===leadId);
      if(!l||l.status===status) return;
      await updateDoc(doc(db,'leads',leadId),{status,log:arrayUnion({user:currentUser?.nome||'—',note:`Status → ${status} (arrastado)`,ts:new Date().toISOString(),statusChange:status})});
      showToast(`Movido → ${STATUS_META[status].label}`);
    };
  });
}

function kanbanCard(l){
  const wa=formatPhone(l.phone);
  const today=new Date();today.setHours(23,59,59,999);
  const todayStart=new Date();todayStart.setHours(0,0,0,0);
  let urgentClass='';let daysLateHtml='';
  if(l.nextFollowup){
    const fu=l.nextFollowup?.toDate?l.nextFollowup.toDate():new Date(l.nextFollowup);
    if(fu<=today&&['EM ANDAMENTO','SEM RESPOSTA','QUALIFICADO'].includes(l.status)){
      urgentClass='k-card-urgent';
      const dl=Math.floor((todayStart-fu)/(1000*60*60*24));
      if(dl>0) daysLateHtml=`<span class="k-late">${dl}d atraso</span>`;
    }
  }
  return `
  <div class="k-card ${urgentClass}" draggable="true"
    ondragstart="event.dataTransfer.setData('leadId','${l.id}');this.classList.add('dragging')"
    ondragend="this.classList.remove('dragging')"
    onclick="openLead('${l.id}')">
    <div class="k-top"><span class="k-name">${l.name||'Sem Nome'}</span>${l.tipo?`<span class="tipo-tag tipo-${l.tipo==='SM'?'sm':'geral'} k-tipo">${l.tipo==='SM'?'SM':'Geral'}</span>`:''}</div>
    ${l.campaign?`<span class="campaign-tag">${l.campaign}</span>`:''}
    <div class="k-meta">${l.phone?`<span class="k-phone">${l.phone}</span>`:''}<span class="k-resp">${l.assignee||'—'}</span>${daysLateHtml}</div>
    ${l.currentNote?`<div class="k-note">${l.currentNote}</div>`:''}
    <div class="k-footer" onclick="event.stopPropagation()">
      ${wa?`<a href="https://wa.me/${wa}" target="_blank" class="btn-wa-xs">WhatsApp</a>`:'<span></span>'}
      ${l.nextFollowup?`<span class="k-fu ${urgentClass?'urgent-fu':''}">📅 ${formatDate(l.nextFollowup?.toDate?l.nextFollowup.toDate():new Date(l.nextFollowup))}</span>`:''}
    </div>
  </div>`;
}

// ─── TABLE ───
function renderTable(){
  let filtered=allLeads;
  if(filterStatus!=='ALL') filtered=filtered.filter(l=>l.status===filterStatus);
  if(searchQuery){const q=searchQuery.toLowerCase();filtered=filtered.filter(l=>(l.name||'').toLowerCase().includes(q)||(l.phone||'').includes(q));}
  const tbody=document.getElementById('table-body');
  if(!filtered.length){tbody.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:2rem;color:#666">Nenhum lead encontrado</td></tr>`;return;}
  tbody.innerHTML=filtered.map(l=>{
    const sm=STATUS_META[l.status]||STATUS_META['EM ANDAMENTO'];
    const wa=formatPhone(l.phone);
    const created=l.createdAt?.toDate?l.createdAt.toDate():null;
    const fu=l.nextFollowup?.toDate?l.nextFollowup.toDate():l.nextFollowup?new Date(l.nextFollowup):null;
    const today=new Date();today.setHours(23,59,59,999);
    const isUrgent=fu&&fu<=today&&['EM ANDAMENTO','SEM RESPOSTA','QUALIFICADO'].includes(l.status);
    return `<tr class="t-row" onclick="openLead('${l.id}')">
      <td>${created?formatDate(created):'—'}</td>
      <td class="t-name">${l.name||'Sem Nome'}</td>
      <td onclick="event.stopPropagation()">${wa?`<a href="https://wa.me/${wa}" target="_blank" class="btn-wa-xs">${l.phone||'—'}</a>`:l.phone||'—'}</td>
      <td>${l.tipo==='SM'?'<span class="tipo-tag tipo-sm">SM</span>':'<span class="tipo-tag tipo-geral">Geral</span>'}</td>
      <td>${l.campaign||'—'}</td>
      <td><span class="status-pill" style="color:${sm.color};background:${sm.bg}">${sm.label}</span></td>
      <td>${l.assignee||'—'}</td>
      <td class="t-note">${l.currentNote||'—'}</td>
      <td class="${isUrgent?'urgent-fu':''}">${fu?formatDate(fu):'—'}</td>
    </tr>`;
  }).join('');
}

// ─── LEAD MODAL ───
window.openLead=function(id){
  const l=id==='new'?null:allLeads.find(x=>x.id===id);
  editingLeadId=id==='new'?null:id;
  activeQuickNotes.clear();
  document.querySelectorAll('.qn-btn').forEach(b=>b.classList.remove('qn-active'));
  document.getElementById('modal-lead-title').textContent=l?`Editar — ${l.name||'Sem Nome'}`:'Novo Lead';

  document.getElementById('f-campaign').value=l?.campaign||'';
  document.getElementById('f-status').value  =l?.status||'EM ANDAMENTO';
  document.getElementById('f-tipo').value    =l?.tipo||'SM';
  document.getElementById('f-assignee').value=l?.assignee||currentUser?.nome||'';
  document.getElementById('f-note').value    ='';
  document.getElementById('f-parto').value   =l?.dataParto?toDateInput(l.dataParto):'';

function renderEtapasFeitas(history){
  const el=document.getElementById('etapas-feitas'); if(!el) return;
  if(!history.length){el.innerHTML='<span style="color:#6B7280;font-size:.75rem">Nenhuma etapa realizada ainda.</span>';return;}
  el.innerHTML=history.map(e=>`<div class="etapa-item"><span class="etapa-num">✓ ${e.label||'E'+e.etapa}</span><span class="etapa-info">${e.doneBy} — ${formatDatetime(new Date(e.doneAt))}</span></div>`).join('');
}

function renderLog(log){
  const el=document.getElementById('lead-log');
  if(!log.length){el.innerHTML=`<div class="log-empty">Nenhum histórico ainda.</div>`;return;}
  el.innerHTML=[...log].reverse().map(e=>`
    <div class="log-entry">
      <div class="log-meta"><span class="log-user">${e.user}</span><span class="log-time">${formatDatetime(e.ts?.toDate?e.ts.toDate():new Date(e.ts))}</span></div>
      <div class="log-text">${e.note}</div>
      ${e.statusChange?`<span class="log-status-badge">→ ${e.statusChange}</span>`:''}

window.addQuickNote=function(note,btn){
  const el=document.getElementById('f-note');
  if(activeQuickNotes.has(note)){
    activeQuickNotes.delete(note);btn.classList.remove('qn-active');
    el.value=el.value.replace(' — '+note,'').replace(note+' — ','').replace(note,'').trim();
  } else {
    activeQuickNotes.add(note);btn.classList.add('qn-active');

window.saveLead=async function(){
  const name    =document.getElementById('f-name').value.trim()||'Sem Nome';
  const phone   =document.getElementById('f-phone').value.trim();
  const campaign=document.getElementById('f-campaign').value;
  const status  =document.getElementById('f-status').value;
  const tipo    =document.getElementById('f-tipo').value;
  const assignee=document.getElementById('f-assignee').value;
  const note    =document.getElementById('f-note').value.trim();
  const partoVal=document.getElementById('f-parto').value;
  const dataParto=partoVal?Timestamp.fromDate(new Date(partoVal+'T12:00:00')):null;
  if(!editingLeadId){
    const d=new Date();d.setDate(d.getDate()+(tipo==='SM'?TRILHA_SM[0]:TRILHA_GERAL[0]));
    await addDoc(collection(db,'leads'),{name,phone,campaign,status,tipo,assignee,currentNote:note,nextFollowup:Timestamp.fromDate(d),dataParto,etapaFollowup:0,followupHistory:[],createdAt:serverTimestamp(),lastContact:serverTimestamp(),log:note?[{user:assignee,note,ts:new Date().toISOString(),statusChange:null}]:[]});
    showToast('Lead criado! Trilha iniciada automaticamente.');
  } else {
    const existing=allLeads.find(l=>l.id===editingLeadId);
    const statusChanged=existing?.status&&existing.status!==status;
    const partoChanged=partoVal&&!existing?.dataParto;
    const upd={name,phone,campaign,status,tipo,assignee,lastContact:serverTimestamp()};
    if(note) upd.currentNote=note;
    if(dataParto) upd.dataParto=dataParto;
    if(partoChanged&&tipo==='SM'){
      const etapa=existing?.etapaFollowup||0;
      if(etapa>=TRILHA_SM.length){const b=new Date();b.setMonth(b.getMonth()+1);upd.nextFollowup=Timestamp.fromDate(b);upd.ultimoFollowupMensal=serverTimestamp();}
    }
    upd.log=arrayUnion({user:assignee,note:note||(statusChanged?`Status → ${status}`:'Atualizado'),ts:new Date().toISOString(),statusChange:statusChanged?status:null});
    await updateDoc(doc(db,'leads',editingLeadId),upd);
    showToast(partoChanged?'Trilha mensal ativada!':'Lead atualizado!');
  }
  closeLead();
};

window.deleteLead=async function(){
  if(!editingLeadId||!confirm('Excluir este lead permanentemente?')) return;
  await deleteDoc(doc(db,'leads',editingLeadId));
  showToast('Lead removido.','warn');closeLead();
};

window.importarExcel=async function(input){
  const file=input.files[0]; if(!file) return; input.value='';
  const reader=new FileReader();
  reader.onload=async function(e){
    try{
      const wb=XLSX.read(e.target.result,{type:'array'});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
      const dataRows=rows.slice(1).filter(r=>r[1]&&String(r[1]).trim());
      let imp=0,err=0;
      showToast(`Importando ${dataRows.length} leads...`,'warn');
      for(const row of dataRows){
        const dataSerial=parseFloat(row[0]);
        const nome=String(row[1]||'').trim()||'Sem Nome';
        const telefone=String(row[2]||'').trim();
        const status=normalizeStatus(String(row[3]||'').trim());
        let campanha='';
        for(let c=4;c<=9;c++){if(row[c]&&String(row[c]).trim()){campanha=String(row[c]).trim();break;}}
        const obs=String(row[11]||'').trim();
        const obsL=obs.toLowerCase();
        const atendente=obsL.startsWith('joelma')?'Joelma':'Isabel';
        const tipo=(campanha.toUpperCase().includes('SM')||obsL.includes('salário maternidade')||obsL.includes('salario maternidade'))?'SM':'GERAL';
        let createdAt=new Date();
        if(dataSerial>0){const ep=new Date(1899,11,30);createdAt=new Date(ep.getTime()+dataSerial*86400000);}
        const nextFu=new Date(createdAt);nextFu.setDate(nextFu.getDate()+1);
        try{
          await addDoc(collection(db,'leads'),{name:nome,phone:telefone,campaign:campanha,status,tipo,assignee:atendente,currentNote:obs,nextFollowup:Timestamp.fromDate(nextFu),dataParto:null,etapaFollowup:0,followupHistory:[],createdAt:Timestamp.fromDate(createdAt),lastContact:Timestamp.fromDate(createdAt),log:obs?[{user:atendente,note:obs,ts:createdAt.toISOString(),statusChange:null}]:[],importado:true});
          imp++;
        }catch(er){err++;}
      }
      showToast(`✅ ${imp} leads importados!${err?` (${err} erros)`:''}`);
    }catch(er){showToast('Erro: '+er.message,'error');}
  };
  reader.readAsArrayBuffer(file);
};

function normalizeStatus(s){
  const map={'EM ANDAMENTO':'EM ANDAMENTO','QUALIFICADO':'QUALIFICADO','DESQUALIFICADO':'DESQUALIFICADO','SEM RESPOSTA':'SEM RESPOSTA','CONTRATO FECHADO':'CONTRATO FECHADO'};
  return map[s.toUpperCase()]||'EM ANDAMENTO';
}

window.fazerBackup=function(){
  if(!allLeads.length) return showToast('Nenhum lead','warn');
  const rows=allLeads.map(l=>{
    const created=l.createdAt?.toDate?l.createdAt.toDate():null;
    const fu=l.nextFollowup?.toDate?l.nextFollowup.toDate():l.nextFollowup?new Date(l.nextFollowup):null;
    const parto=l.dataParto?.toDate?l.dataParto.toDate():l.dataParto?new Date(l.dataParto):null;
    const hist=(l.followupHistory||[]).map(h=>`${h.label}(${h.doneBy} ${formatDatetime(new Date(h.doneAt))})`).join(' | ');
    const logTxt=(l.log||[]).map(e=>`[${formatDatetime(new Date(e.ts))} ${e.user}] ${e.note}`).join(' || ');
    return{'ID':l.id,'Data Entrada':created?formatDate(created):'—','Nome':l.name||'','Telefone':l.phone||'','Tipo':l.tipo==='SM'?'Salário Maternidade':'Geral','Campanha':l.campaign||'','Status':STATUS_META[l.status]?.label||l.status||'','Atendente':l.assignee||'','Última Nota':l.currentNote||'','Data Parto':parto?formatDate(parto):'—','Próx. Follow-up':fu?formatDate(fu):'—','Etapa':l.etapaFollowup||0,'Trilha':hist,'Histórico':logTxt};
  });
  const ws=XLSX.utils.json_to_sheet(rows);
  ws['!cols']=[{wch:22},{wch:12},{wch:25},{wch:18},{wch:20},{wch:12},{wch:18},{wch:12},{wch:40},{wch:12},{wch:14},{wch:6},{wch:50},{wch:80}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,'Backup');
  const dt=new Date().toLocaleDateString('pt-BR').replace(/\//g,'-');
  XLSX.writeFile(wb,`Backup_CRM_${dt}.xlsx`);
  showToast(`✅ Backup de ${allLeads.length} leads exportado!`);
};

function getLeadsPorPeriodo(semFiltroStatus){
  const periodo=document.getElementById('rel-periodo')?.value||'mes-atual';
  const statusF=semFiltroStatus?'TODOS':(relKpiFilter||document.getElementById('rel-status')?.value||'TODOS');
  const dataIni=document.getElementById('rel-data-ini')?.value;
  const dataFim=document.getElementById('rel-data-fim')?.value;
  const now=new Date(); let ini,fim;
  if(periodo==='mes-atual'){ini=new Date(now.getFullYear(),now.getMonth(),1);fim=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);}
  else if(periodo==='mes-anterior'){ini=new Date(now.getFullYear(),now.getMonth()-1,1);fim=new Date(now.getFullYear(),now.getMonth(),0,23,59,59);}
  else if(periodo==='6-meses'){ini=new Date(now);ini.setMonth(ini.getMonth()-6);ini.setDate(1);fim=new Date(now);fim.setHours(23,59,59,999);}
  else if(periodo==='especifica'&&dataIni&&dataFim){ini=new Date(dataIni+'T00:00:00');fim=new Date(dataFim+'T23:59:59');}
  else{ini=new Date(now.getFullYear(),now.getMonth(),1);fim=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);}
  let leads=allLeads.filter(l=>{const d=l.createdAt?.toDate?.();return d&&d>=ini&&d<=fim;});
  if(statusF!=='TODOS') leads=leads.filter(l=>l.status===statusF);
  return leads;
}

window.renderEstrategia=function(){
  const now=new Date();
  const todayStart=new Date(now);todayStart.setHours(0,0,0,0);
  const ini=new Date(now.getFullYear(),now.getMonth(),1);
  const fim=new Date(now.getFullYear(),now.getMonth()+1,0,23,59,59);
  const mesLeads=allLeads.filter(l=>{const d=l.createdAt?.toDate?.();return d&&d>=ini&&d<=fim;});

  // BLOCO 1 — Alertas críticos
  const partoProximo=allLeads.filter(l=>{
    if(l.status==='CONTRATO FECHADO'||l.status==='DESQUALIFICADO') return false;
    if(!l.dataParto) return false;
    const p=l.dataParto?.toDate?l.dataParto.toDate():new Date(l.dataParto);
    const dias=Math.floor((p-now)/(1000*60*60*24));
    return dias>=0&&dias<=60;
  }).sort((a,b)=>{
    const pa=a.dataParto?.toDate?a.dataParto.toDate():new Date(a.dataParto);
    const pb=b.dataParto?.toDate?b.dataParto.toDate():new Date(b.dataParto);
    return pa-pb;
  });

  const qualifParados=allLeads.filter(l=>{
    if(l.status!=='QUALIFICADO') return false;
    const lc=l.lastContact?.toDate?l.lastContact.toDate():null;
    if(!lc) return true;
    return Math.floor((now-lc)/(1000*60*60*24))>=7;
  });

  const esfriando=allLeads.filter(l=>{
    if(!['EM ANDAMENTO','SEM RESPOSTA'].includes(l.status)) return false;
    const lc=l.lastContact?.toDate?l.lastContact.toDate():null;
    if(!lc) return false;
    return Math.floor((now-lc)/(1000*60*60*24))>=15;
  });

  const fuAtrasados=allLeads.filter(l=>{
    if(!['EM ANDAMENTO','SEM RESPOSTA','QUALIFICADO'].includes(l.status)) return false;
    if(!l.nextFollowup) return false;
    const d=l.nextFollowup?.toDate?l.nextFollowup.toDate():new Date(l.nextFollowup);
    return d<todayStart;
  });

  // BLOCO 2 — Pipeline
  const qualif=mesLeads.filter(l=>l.status==='QUALIFICADO').length;
  const contratos=mesLeads.filter(l=>l.status==='CONTRATO FECHADO').length;
  const andamento=mesLeads.filter(l=>l.status==='EM ANDAMENTO').length;
  const taxaConv=qualif?Math.round(contratos/qualif*100):0;
  const potencial=qualif+andamento;

  // BLOCO 3 — Campanha
  const campStats={};
  mesLeads.forEach(l=>{
    const c=l.campaign||'Sem campanha';
    if(!campStats[c]) campStats[c]={total:0,qualif:0,contrato:0};
    campStats[c].total++;
    if(l.status==='QUALIFICADO') campStats[c].qualif++;
    if(l.status==='CONTRATO FECHADO') campStats[c].contrato++;
  });

  // BLOCO 4 — Equipe
  const equipeStats={};
  mesLeads.forEach(l=>{
    const a=l.assignee||'—';
    if(!equipeStats[a]) equipeStats[a]={total:0,qualif:0,contrato:0,fuFeitos:0,fuAtrasados:0};
    equipeStats[a].total++;
    if(l.status==='QUALIFICADO') equipeStats[a].qualif++;
    if(l.status==='CONTRATO FECHADO') equipeStats[a].contrato++;
    if(fuAtrasados.find(x=>x.id===l.id)) equipeStats[a].fuAtrasados++;
    equipeStats[a].fuFeitos+=(l.followupHistory||[]).length;
  });

  const el=document.getElementById('estrategia-content'); if(!el) return;
  el.innerHTML=`
  <!-- ALERTAS -->
  <div class="est-section">
    <div class="est-section-title">🚨 Alertas Críticos</div>
    <div class="est-alerts-grid">
      <div class="est-alert ${partoProximo.length?'alert-red':'alert-ok'}">
        <div class="est-alert-num">${partoProximo.length}</div>
        <div class="est-alert-label">SM com parto<br>em até 60 dias</div>
      </div>
      <div class="est-alert ${qualifParados.length?'alert-orange':'alert-ok'}">
        <div class="est-alert-num">${qualifParados.length}</div>
        <div class="est-alert-label">Qualificados<br>parados +7 dias</div>
      </div>
      <div class="est-alert ${esfriando.length?'alert-orange':'alert-ok'}">
        <div class="est-alert-num">${esfriando.length}</div>
        <div class="est-alert-label">Esfriando<br>+15 dias sem contato</div>
      </div>
      <div class="est-alert ${fuAtrasados.length?'alert-red':'alert-ok'}">
        <div class="est-alert-num">${fuAtrasados.length}</div>
        <div class="est-alert-label">Follow-ups<br>em atraso</div>
      </div>
    </div>
  </div>

  <!-- PIPELINE -->
  <div class="est-section">
    <div class="est-section-title">📊 Pipeline do Mês</div>
    <div class="est-pipeline-grid">
      <div class="est-pipe-card">
        <div class="est-pipe-num" style="color:#4F6EF7">${mesLeads.length}</div>
        <div class="est-pipe-label">Leads entrados</div>
      </div>
      <div class="est-pipe-arrow">→</div>
      <div class="est-pipe-card">
        <div class="est-pipe-num" style="color:#10B981">${qualif}</div>
        <div class="est-pipe-label">Qualificados</div>
      </div>
      <div class="est-pipe-arrow">→</div>
      <div class="est-pipe-card">
        <div class="est-pipe-num" style="color:#8B5CF6">${contratos}</div>
        <div class="est-pipe-label">Contratos</div>
      </div>
      <div class="est-pipe-arrow">→</div>
      <div class="est-pipe-card">
        <div class="est-pipe-num" style="color:#F5A623">${taxaConv}%</div>
        <div class="est-pipe-label">Taxa qualif.→contrato</div>
      </div>
    </div>
    <div class="est-insight">
      💡 <strong>${potencial} leads</strong> ainda podem virar contrato este mês (em andamento + qualificados).
      ${contratos===0&&qualif>0?` <span style="color:#F5A623">Atenção: ${qualif} leads qualificados sem contrato fechado.</span>`:''}
    </div>
  </div>

  <!-- CAMPANHAS -->
  <div class="est-section">
    <div class="est-section-title">📢 Eficiência por Campanha</div>
    <div class="est-table-wrap">
      <table class="est-table">
        <thead><tr><th>Campanha</th><th>Leads</th><th>Qualif.</th><th>Contratos</th><th>Taxa Qualif.</th><th>Diagnóstico</th></tr></thead>
        <tbody>
          ${Object.entries(campStats).sort((a,b)=>b[1].total-a[1].total).map(([camp,s])=>{
            const taxa=s.total?Math.round(s.qualif/s.total*100):0;
            let diag='',diagClass='';
            if(taxa>=30){diag='✅ Alta conversão';diagClass='diag-green';}
            else if(taxa>=15){diag='⚡ Conversão média';diagClass='diag-amber';}
            else if(s.total>=5){diag='⚠️ Baixa conversão — revisar';diagClass='diag-red';}
            else{diag='— Poucos dados';diagClass='';}
            return `<tr><td class="est-camp-name">${camp}</td><td>${s.total}</td><td>${s.qualif}</td><td>${s.contrato}</td><td><span class="taxa-badge" style="color:${taxa>=30?'#10B981':taxa>=15?'#F5A623':'#EF4444'}">${taxa}%</span></td><td><span class="diag-badge ${diagClass}">${diag}</span></td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <!-- EQUIPE -->
  <div class="est-section">
    <div class="est-section-title">👥 Desempenho da Equipe</div>
    <div class="est-table-wrap">
      <table class="est-table">

        <tbody>
          ${Object.entries(equipeStats).map(([nome,s])=>{
            const ef=s.total?Math.round((s.qualif+s.contrato)/s.total*100):0;
            return `<tr><td class="est-camp-name">${nome}</td><td>${s.total}</td><td>${s.qualif}</td><td>${s.contrato}</td><td>${s.fuFeitos}</td><td class="${s.fuAtrasados>0?'text-red':''}">${s.fuAtrasados}</td><td><span class="taxa-badge" style="color:${ef>=30?'#10B981':ef>=15?'#F5A623':'#EF4444'}">${ef}%</span></td></tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>

  <!-- LEADS PARA RESGATAR -->
  ${(partoProximo.length||qualifParados.length||esfriando.length)?`
  <div class="est-section">
    <div class="est-section-title">🔁 Leads para Ação Imediata</div>
    <div class="est-resgate-grid">
      ${partoProximo.map(l=>{
        const p=l.dataParto?.toDate?l.dataParto.toDate():new Date(l.dataParto);
        const dias=Math.floor((p-now)/(1000*60*60*24));
        const wa=formatPhone(l.phone);
        return `<div class="est-resgate-card urgente"><div class="est-r-tag">🍼 Parto em ${dias}d</div><div class="est-r-name">${l.name||'Sem Nome'}</div><div class="est-r-info">${l.assignee||'—'} · ${l.campaign||'—'}</div>${wa?`<a href="https://wa.me/${wa}" target="_blank" class="btn-wa-xs" style="margin-top:.4rem">WhatsApp</a>`:''}</div>`;
      }).join('')}
      ${qualifParados.map(l=>{
        const wa=formatPhone(l.phone);
        const lc=l.lastContact?.toDate?l.lastContact.toDate():null;
        const dias=lc?Math.floor((now-lc)/(1000*60*60*24)):0;
        return `<div class="est-resgate-card qualif"><div class="est-r-tag">⭐ Qualif. parado ${dias}d</div><div class="est-r-name">${l.name||'Sem Nome'}</div><div class="est-r-info">${l.assignee||'—'} · ${l.campaign||'—'}</div>${wa?`<a href="https://wa.me/${wa}" target="_blank" class="btn-wa-xs" style="margin-top:.4rem">WhatsApp</a>`:''}</div>`;
      }).join('')}
      ${esfriando.slice(0,6).map(l=>{
        const wa=formatPhone(l.phone);
        const lc=l.lastContact?.toDate?l.lastContact.toDate():null;
        const dias=lc?Math.floor((now-lc)/(1000*60*60*24)):0;
        return `<div class="est-resgate-card esfriando"><div class="est-r-tag">❄️ Esfriando ${dias}d</div><div class="est-r-name">${l.name||'Sem Nome'}</div><div class="est-r-info">${l.assignee||'—'} · ${l.campaign||'—'}</div>${wa?`<a href="https://wa.me/${wa}" target="_blank" class="btn-wa-xs" style="margin-top:.4rem">WhatsApp</a>`:''}</div>`;
      }).join('')}
    </div>
  </div>`:''}`;
};

// ─── TABS ───
window.switchTab=function(tab){
  currentTab=tab;
  ['kanban','table','equipe','relatorios','estrategia'].forEach(t=>{
    document.getElementById('tab-'+t)?.classList.toggle('tab-active',t===tab);
    document.getElementById('view-'+t)?.classList.toggle('hidden',t!==tab);
  });
  if(tab==='relatorios') setTimeout(renderRelatorios,100);
  else if(tab==='estrategia') setTimeout(renderEstrategia,100);
  else renderAll();
};

window.setFilter=function(s){filterStatus=s;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));document.getElementById('filter-'+s)?.classList.add('active');renderTable();};
window.onSearch=v=>{searchQuery=v;renderTable();};

// ─── UTILS ───
function toDateInput(ts){const d=ts?.toDate?ts.toDate():new Date(ts);return d.toISOString().slice(0,10);}
function formatPhone(p){if(!p) return '';return '55'+p.replace(/\D/g,'').replace(/^55/,'').replace(/^0/,'');}
function formatDate(d){return d?new Date(d).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'2-digit'}):'—';}
function formatDatetime(d){return d?new Date(d).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'}):'—';}
function showToast(msg,type='success'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast show '+type;setTimeout(()=>t.className='toast',3500);}
function setBtnLoading(id,l){const b=document.getElementById(id);if(!b)return;b.disabled=l;if(l)b.dataset.label=b.textContent;b.textContent=l?'Aguarde...':(b.dataset.label||b.textContent);}
function fbErr(code){return({'auth/email-already-in-use':'E-mail já em uso.','auth/invalid-email':'E-mail inválido.','auth/wrong-password':'Senha incorreta.','auth/user-not-found':'Usuário não encontrado.','auth/weak-password':'Senha fraca.','auth/invalid-credential':'E-mail ou senha incorretos.'}[code]||'Erro: '+code);}
</script>

.est-resgate-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:.75rem}
.est-resgate-card{background:#0B0D14;border-radius:9px;padding:.9rem;display:flex;flex-direction:column;gap:.3rem;border:1px solid #1E2235}
.est-resgate-card.urgente{border-color:rgba(239,68,68,.3)}
.est-resgate-card.qualif{border-color:rgba(16,185,129,.3)}
.est-resgate-card.esfriando{border-color:rgba(79,110,247,.3)}
.est-r-tag{font-size:.65rem;font-weight:700;color:#9CA3AF}
.est-r-name{font-size:.82rem;font-weight:600;color:#F1F3F9}
.est-r-info{font-size:.7rem;color:#6B7280}

/* EQUIPE */
.equipe-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.equipe-title{font-size:.95rem;font-weight:700}
#equipe-lista{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:.85rem}
.user-card{background:#13161F;border:1px solid #1E2235;border-radius:10px;padding:1.1rem;display:flex;align-items:center;gap:.85rem}
.user-avatar{width:40px;height:40px;border-radius:50%;background:#4F6EF7;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:700;color:#fff;flex-shrink:0}
.user-info{flex:1;display:flex;flex-direction:column;gap:.18rem}
.user-name{font-size:.85rem;font-weight:600}
.user-email{font-size:.7rem;color:#6B7280}
.user-role{display:inline-flex;padding:.12rem .45rem;border-radius:4px;font-size:.65rem;font-weight:700;margin-top:.15rem}
.role-gestora{background:rgba(79,110,247,.15);color:#4F6EF7}
.role-atendente{background:rgba(16,185,129,.12);color:#10B981}
.btn-edit-user{background:#1E2235;border:1px solid #2A2F45;border-radius:6px;color:#9CA3AF;font-size:.7rem;padding:.3rem .65rem;cursor:pointer;transition:all .15s}
.btn-edit-user:hover{border-color:#4F6EF7;color:#4F6EF7}

/* SHARED */
.status-pill{display:inline-flex;padding:.18rem .55rem;border-radius:999px;font-size:.65rem;font-weight:700;white-space:nowrap}
.campaign-tag{display:inline-flex;background:rgba(79,110,247,.12);color:#4F6EF7;border-radius:4px;font-size:.65rem;font-weight:600;padding:.12rem .4rem}
.tipo-tag{display:inline-flex;border-radius:4px;font-size:.68rem;font-weight:700;padding:.12rem .4rem}
.tipo-sm{background:rgba(16,185,129,.12);color:#10B981}
.tipo-geral{background:rgba(79,110,247,.12);color:#4F6EF7}
.btn-wa{background:#1DAA61;color:#fff;border:none;border-radius:5px;padding:.28rem .65rem;font-size:.7rem;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap}
.btn-done{background:transparent;color:#10B981;border:1px solid #10B981;border-radius:5px;padding:.28rem .65rem;font-size:.7rem;font-weight:600;cursor:pointer}
.btn-done:hover{background:rgba(16,185,129,.12)}
.btn-wa-xs{display:inline-flex;background:#1DAA61;color:#fff;border:none;border-radius:5px;padding:.22rem .55rem;font-size:.68rem;font-weight:600;cursor:pointer;text-decoration:none;white-space:nowrap}
.urgent-fu{color:#F5A623;font-weight:600}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:none;align-items:center;justify-content:center;padding:1rem}
.modal-box{background:#13161F;border:1px solid #1E2235;border-radius:14px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
.modal-head{padding:1.1rem 1.4rem;border-bottom:1px solid #1E2235;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;background:#13161F;z-index:2}
.modal-title{font-size:.95rem;font-weight:700}
.modal-close{background:none;border:none;color:#6B7280;font-size:1.2rem;cursor:pointer;transition:color .2s}
.modal-close:hover{color:#F1F3F9}
.modal-body{padding:1.4rem;display:flex;flex-direction:column;gap:1.1rem}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:.85rem}
.f-group{display:flex;flex-direction:column;gap:.35re
